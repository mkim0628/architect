<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 760" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <defs>
    <style>
      .sys { fill: none; stroke: #444444; stroke-width: 1.5; }
      .uc { fill: #F5E6C8; stroke: #7A5C2E; stroke-width: 1.3; }
      .uctext { font-size: 12.5px; fill: #1F2A44; text-anchor: middle; }
      .ucsub { font-size: 11px; fill: #1F2A44; text-anchor: middle; }
      .ucnum { font-size: 10px; fill: #7A5C2E; text-anchor: middle; }
      .actor { stroke: #1F2A44; stroke-width: 1.6; fill: none; }
      .actorlabel { font-size: 12.5px; fill: #1F2A44; text-anchor: middle; font-weight: bold; }
      .assoc { stroke: #555555; stroke-width: 1.1; }
      .dep { stroke: #7A5C2E; stroke-width: 1.1; stroke-dasharray: 5 4; }
      .stereo { font-size: 10.5px; fill: #7A5C2E; text-anchor: middle; font-style: italic; }
      .title { font-size: 15px; font-weight: bold; fill: #1F2A44; text-anchor: middle; }
    </style>
    <marker id="openArrow" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M1,1 L10,5 L1,9" fill="none" stroke="#7A5C2E" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- system boundary -->
  <rect class="sys" x="255" y="42" width="560" height="672"/>
  <text class="title" x="535" y="68">MCR 1단계 — KV 캐시 최적 운용 AI 런타임</text>

  <!-- ===== actors (left, primary) ===== -->
  <!-- LLM 응용 클라이언트 -->
  <g class="actor">
    <circle cx="120" cy="150" r="13"/>
    <line x1="120" y1="163" x2="120" y2="196"/>
    <line x1="100" y1="174" x2="140" y2="174"/>
    <line x1="120" y1="196" x2="104" y2="222"/>
    <line x1="120" y1="196" x2="136" y2="222"/>
  </g>
  <text class="actorlabel" x="120" y="242">LLM 응용 클라이언트</text>
  <text class="ucnum" x="120" y="258">(RAG · multiturn · agent)</text>

  <!-- 운영자 -->
  <g class="actor">
    <circle cx="120" cy="500" r="13"/>
    <line x1="120" y1="513" x2="120" y2="546"/>
    <line x1="100" y1="524" x2="140" y2="524"/>
    <line x1="120" y1="546" x2="104" y2="572"/>
    <line x1="120" y1="546" x2="136" y2="572"/>
  </g>
  <text class="actorlabel" x="120" y="592">운영자 (SRE)</text>

  <!-- ===== actors (right, secondary) ===== -->
  <!-- 메모리 tier -->
  <g class="actor">
    <circle cx="955" cy="270" r="13"/>
    <line x1="955" y1="283" x2="955" y2="316"/>
    <line x1="935" y1="294" x2="975" y2="294"/>
    <line x1="955" y1="316" x2="939" y2="342"/>
    <line x1="955" y1="316" x2="971" y2="342"/>
  </g>
  <text class="actorlabel" x="955" y="362">메모리 tier</text>
  <text class="ucnum" x="955" y="378">(HBM · DRAM · SSD)</text>
  <text class="ucnum" x="955" y="392">(2단계: 자사 디바이스 plug-in)</text>

  <!-- ===== use cases: column A (serving/scheduling, cx=400) ===== -->
  <ellipse class="uc" cx="400" cy="120" rx="112" ry="27"/>
  <text class="ucnum" x="400" y="112">UC-01</text>
  <text class="uctext" x="400" y="128">long-context RAG 요청 서빙</text>

  <ellipse class="uc" cx="400" cy="200" rx="112" ry="27"/>
  <text class="ucnum" x="400" y="192">UC-02</text>
  <text class="uctext" x="400" y="208">multiturn 세션 서빙</text>

  <ellipse class="uc" cx="400" cy="280" rx="112" ry="27"/>
  <text class="ucnum" x="400" y="272">UC-03</text>
  <text class="uctext" x="400" y="288">agent memory 영속·복원</text>

  <ellipse class="uc" cx="400" cy="430" rx="112" ry="27"/>
  <text class="ucnum" x="400" y="422">UC-07</text>
  <text class="uctext" x="400" y="436">KV 인지 admission·라우팅</text>

  <ellipse class="uc" cx="400" cy="560" rx="112" ry="27"/>
  <text class="ucnum" x="400" y="552">UC-09</text>
  <text class="uctext" x="400" y="568">P/D 분리 스케줄링·KV 전송</text>

  <ellipse class="uc" cx="400" cy="650" rx="112" ry="27"/>
  <text class="ucnum" x="400" y="642">UC-10</text>
  <text class="uctext" x="400" y="658">KV telemetry·P/D 자동 조정</text>

  <!-- ===== use cases: column B (KV ops, cx=675) ===== -->
  <ellipse class="uc" cx="675" cy="123" rx="112" ry="30"/>
  <text class="ucnum" x="675" y="110">UC-04</text>
  <text class="uctext" x="675" y="124">KV 재사용 판정·복원</text>
  <text class="ucsub" x="675" y="139">(복원 vs 재계산)</text>

  <ellipse class="uc" cx="675" cy="230" rx="112" ry="27"/>
  <text class="ucnum" x="675" y="222">UC-05</text>
  <text class="uctext" x="675" y="238">KV 압축·복원 (요청별 차등)</text>

  <ellipse class="uc" cx="675" cy="330" rx="112" ry="27"/>
  <text class="ucnum" x="675" y="322">UC-06</text>
  <text class="uctext" x="675" y="338">KV tier 배치·승격·강등</text>

  <ellipse class="uc" cx="675" cy="463" rx="112" ry="30"/>
  <text class="ucnum" x="675" y="450">UC-08</text>
  <text class="uctext" x="675" y="464">KV 공간 확보</text>
  <text class="ucsub" x="675" y="479">(KV 풀 포화 시 압축/강등/축출 선택)</text>

  <!-- ===== associations (solid) ===== -->
  <line class="assoc" x1="150" y1="170" x2="288" y2="122"/>
  <line class="assoc" x1="152" y1="185" x2="288" y2="198"/>
  <line class="assoc" x1="150" y1="200" x2="290" y2="272"/>
  <line class="assoc" x1="150" y1="520" x2="290" y2="444"/>
  <line class="assoc" x1="152" y1="535" x2="288" y2="558"/>
  <line class="assoc" x1="148" y1="548" x2="288" y2="643"/>
  <line class="assoc" x1="787" y1="322" x2="924" y2="290"/>

  <!-- ===== include / extend (dashed) ===== -->
  <!-- UC-01 → UC-04 -->
  <line class="dep" x1="512" y1="120" x2="558" y2="121" marker-end="url(#openArrow)"/>
  <text class="stereo" x="536" y="110">&#171;include&#187;</text>

  <!-- UC-02 → UC-04 -->
  <line class="dep" x1="505" y1="192" x2="573" y2="146" marker-end="url(#openArrow)"/>
  <text class="stereo" x="558" y="182">&#171;include&#187;</text>

  <!-- UC-05 → UC-06 (extend: 강등 시 압축 병행) -->
  <line class="dep" x1="675" y1="257" x2="675" y2="299" marker-end="url(#openArrow)"/>
  <text class="stereo" x="723" y="282">&#171;extend&#187;</text>

  <!-- UC-08 → UC-05 -->
  <line class="dep" x1="655" y1="434" x2="668" y2="261" marker-end="url(#openArrow)"/>
  <text class="stereo" x="628" y="352">&#171;include&#187;</text>

  <!-- UC-08 → UC-06 -->
  <line class="dep" x1="675" y1="433" x2="675" y2="361" marker-end="url(#openArrow)"/>
  <text class="stereo" x="723" y="402">&#171;include&#187;</text>

  <!-- UC-10 → UC-09 -->
  <line class="dep" x1="424" y1="622" x2="408" y2="591" marker-end="url(#openArrow)"/>
  <text class="stereo" x="472" y="612">&#171;include&#187;</text>
</svg>
