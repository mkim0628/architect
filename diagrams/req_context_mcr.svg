<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 680" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <defs>
    <style>
      .ext { fill: #FFFFFF; stroke: #666666; stroke-width: 1.3; }
      .exttitle { font-size: 13px; font-weight: bold; fill: #1F2A44; text-anchor: middle; }
      .extsub { font-size: 10px; fill: #595959; text-anchor: middle; }
      .flow { stroke: #555555; stroke-width: 1.2; fill: none; }
      .flowlabel { font-size: 10.5px; fill: #333333; text-anchor: middle; }
    </style>
    <marker id="arrow" markerWidth="11" markerHeight="9" refX="9" refY="4.5" orient="auto">
      <path d="M1,1 L9,4.5 L1,8" fill="none" stroke="#555555" stroke-width="1.3"/>
    </marker>
  </defs>

  <!-- ===== system (center) ===== -->
  <rect x="420" y="270" width="280" height="140" rx="10" fill="#1F2A44" stroke="#0F1830" stroke-width="1.5"/>
  <text x="560" y="322" text-anchor="middle" font-size="20" font-weight="bold" fill="#FFFFFF">MCR 1단계</text>
  <text x="560" y="344" text-anchor="middle" font-size="12" fill="#DCE4F2">KV 캐시 최적 운용 AI 런타임</text>
  <text x="560" y="366" text-anchor="middle" font-size="9.5" fill="#AFC0DC">Orchestration · Inference Engine · Memory Engine</text>

  <!-- ===== external entities ===== -->
  <rect class="ext" x="50" y="110" width="220" height="72"/>
  <text class="exttitle" x="160" y="140">LLM 응용 클라이언트</text>
  <text class="extsub" x="160" y="160">대표 워크로드: RAG · multiturn · agent</text>

  <rect class="ext" x="50" y="528" width="220" height="72"/>
  <text class="exttitle" x="160" y="558">운영자 (SRE)</text>
  <text class="extsub" x="160" y="578">정책 설정 · 실험 구성 운용</text>

  <rect class="ext" x="850" y="304" width="220" height="72"/>
  <text class="exttitle" x="960" y="330">메모리 tier</text>
  <text class="extsub" x="960" y="348">HBM · DRAM · SSD</text>
  <text class="extsub" x="960" y="362">(2단계: 자사 디바이스 plug-in)</text>

  <!-- ===== flows (lines) ===== -->
  <line class="flow" x1="270" y1="168" x2="418" y2="286" marker-end="url(#arrow)"/>
  <line class="flow" x1="420" y1="312" x2="272" y2="194" marker-end="url(#arrow)"/>
  <line class="flow" x1="270" y1="546" x2="418" y2="398" marker-end="url(#arrow)"/>
  <line class="flow" x1="420" y1="372" x2="272" y2="520" marker-end="url(#arrow)"/>
  <line class="flow" x1="700" y1="322" x2="848" y2="322" marker-end="url(#arrow)"/>
  <line class="flow" x1="848" y1="358" x2="702" y2="358" marker-end="url(#arrow)"/>

  <!-- ===== flow labels (on top, white backing) ===== -->
  <g>
    <rect x="238" y="185" width="204" height="15" fill="#FFFFFF" opacity="0.88"/>
    <text class="flowlabel" x="340" y="196">추론 요청 (RAG·multiturn·agent)</text>
    <rect x="294" y="281" width="104" height="15" fill="#FFFFFF" opacity="0.88"/>
    <text class="flowlabel" x="346" y="292">응답 (생성 토큰)</text>
    <rect x="255" y="494" width="194" height="15" fill="#FFFFFF" opacity="0.88"/>
    <text class="flowlabel" x="352" y="505">SLO 정책 · tier 등록 · 실험 구성</text>
    <rect x="258" y="407" width="144" height="15" fill="#FFFFFF" opacity="0.88"/>
    <text class="flowlabel" x="330" y="418">telemetry · 벤치 리포트</text>
    <text class="flowlabel" x="774" y="300">KV 배치·이동 (offload·승격·강등)</text>
    <text class="flowlabel" x="774" y="314">압축 KV 저장</text>
    <text class="flowlabel" x="774" y="376">데이터(KV) · 상태</text>
  </g>
</svg>
