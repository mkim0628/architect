  <text x="768" y="794" font-size="9.5" fill="#155F3B">CXL · PNM DRAM · HBF adapter —</text>
  <text x="768" y="808" font-size="9.5" fill="#155F3B">tier 추가 = 백엔드 모듈 1개 (코어 무수정)</text>
  <text x="768" y="826" font-size="9.5" fill="#155F3B">표준 KV 계층의 공식 백엔드 등재</text>

  <rect x="1050" y="754" width="270" height="96" fill="#FFFFFF" stroke="#44546A" stroke-width="1.2"/>
  <text x="1064" y="776" font-size="12" font-weight="700" fill="#1F2A44">Tier &amp; Lifecycle</text>
  <text x="1064" y="794" font-size="9.5" fill="#6B7A90">Tier Topology Model · Migration</text>
  <text x="1064" y="812" font-size="9.5" fill="#B3402A">topology 정보가 put/get API 위로</text>
  <text x="1064" y="826" font-size="9.5" fill="#B3402A">전달되지 않음 — 인지 배치 제한</text>

  <text x="730" y="892" font-size="10.5" fill="#B3402A" font-weight="700">리스크: 근접 연산(DP6)·tier-aware decode 경로는 이 계층 밖 — 별도 통로 필요 ·</text>
  <text x="730" y="910" font-size="10.5" fill="#B3402A" font-weight="700">이중 upstream(vLLM+LMCache) 동시 추종 · "LMCache 백엔드 하나"로 인식될 희석 리스크</text>

  <text x="730" y="936" font-size="10.5" fill="#1B7A4B" font-weight="700">이득: KV 계층 전체(압축·재사용·영속화·멀티엔진) 상속 — 초기 비용 전 변형 중 최소, E2E 완주 최속</text>

