  <text x="44" y="36" font-size="20" font-weight="700" fill="#1F2A44">DP1. 실행 스택 소싱 — Inference·Memory Engine의 외부 채택 vs 자체 구현 (후보구조 설계도)</text>
  <text x="44" y="57" font-size="11.5" fill="#6B7A90">후보1 = 외부 스택 활용 (변형 A: KV 골격 자체 · 변형 B: LMCache 편승) · 후보2 = 자체 구현 · 녹색: 구조적 이득 · 적색: 구조적 제약 · 주황: 신설/주입 · □ 포트: 공식 확장점 (vLLM / LMCache)</text>

  <line x1="700" y1="72" x2="700" y2="960" stroke="#C9D2DE" stroke-width="1"/>
