<svg viewBox="0 0 1400 1000" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#1F2A44"/>
    </marker>
    <marker id="arrAmb" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#B45309"/>
    </marker>
    <marker id="arrGrn" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#1B7A4B"/>
    </marker>
  </defs>

  <text x="44" y="36" font-size="20" font-weight="700" fill="#1F2A44">DP1. 실행 스택 소싱 — Inference·Memory Engine의 외부 채택 vs 자체 구현 (후보구조 설계도)</text>
  <text x="44" y="57" font-size="11.5" fill="#6B7A90">후보1은 단일 구조 — KV 데이터-이동 계층 골격의 소유자만 변형 A(MCR)/B(LMCache)로 갈림 · 녹색: 이득 · 적색: 제약 · 주황: 신설/주입 · 베이지: 3rd-party · □: 공식 확장점</text>

  <line x1="700" y1="72" x2="700" y2="950" stroke="#C9D2DE" stroke-width="1"/>

  <!-- ================= LEFT: 후보1 (단일 구조) ================= -->
  <rect x="40" y="76" width="620" height="30" fill="#DCE3EE" stroke="#44546A" stroke-width="1.2"/>
  <text x="52" y="96" font-size="13.5" font-weight="700" fill="#1F2A44">후보구조 1 — 외부 스택 활용형 (vLLM 생태계 기반)</text>

  <!-- Orchestration -->
  <rect x="60" y="124" width="580" height="100" fill="#F4F6FA" stroke="#44546A" stroke-width="1.2"/>
  <text x="74" y="146" font-size="12" font-weight="700" fill="#1F2A44">«MCR» Inference Orchestration — 독립 프로세스 (現 P/D proxy의 정식화)</text>
  <rect x="80" y="158" width="170" height="46" fill="#FFFFFF" stroke="#44546A"/>
  <text x="92" y="178" font-size="11" font-weight="700" fill="#1F2A44">Request Manager</text>
  <text x="92" y="194" font-size="9.5" fill="#6B7A90">admission·RAG·batcher</text>
  <rect x="266" y="158" width="170" height="46" fill="#FFFFFF" stroke="#44546A"/>
  <text x="278" y="178" font-size="11" font-weight="700" fill="#1F2A44">Scheduling</text>
  <text x="278" y="194" font-size="9.5" fill="#6B7A90">KV-aware Router·SLO Mon.</text>
  <rect x="452" y="158" width="170" height="46" fill="#FFFFFF" stroke="#44546A"/>
  <text x="464" y="178" font-size="11" font-weight="700" fill="#1F2A44">Resource Manager</text>
  <text x="464" y="194" font-size="9.5" fill="#6B7A90">HW Mon.·2-loop Autoscaler</text>

  <line x1="200" y1="224" x2="200" y2="258" stroke="#1F2A44" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="210" y="246" font-size="10.5" fill="#1F2A44">«use» dispatch (API/RPC)</text>

  <!-- vLLM process -->
  <rect x="60" y="262" width="580" height="172" fill="#F1EFEA" stroke="#6B7A90" stroke-width="1.4"/>
  <text x="74" y="284" font-size="12" font-weight="700" fill="#1F2A44">«3rd-party» vLLM Engine Process — 무수정 (Inference Engine 자리를 담당)</text>
  <rect x="84" y="300" width="255" height="62" fill="#FFFFFF" stroke="#44546A" stroke-width="1.2"/>
  <text x="98" y="322" font-size="11.5" font-weight="700" fill="#1F2A44">vLLM Scheduler</text>
  <text x="98" y="340" font-size="9.5" fill="#B3402A">tier 비인지 — GPU block 잔량만 (변형 무관)</text>
  <rect x="365" y="300" width="255" height="62" fill="#FFFFFF" stroke="#44546A" stroke-width="1.2"/>
  <text x="379" y="322" font-size="11.5" font-weight="700" fill="#1F2A44">Model Executor / Worker</text>
  <text x="379" y="340" font-size="9.5" fill="#6B7A90">배칭·커널·모델 지원 upstream 무임승차</text>
  <rect x="84" y="374" width="536" height="44" fill="#FDF6E9" stroke="#B45309" stroke-width="1.3" stroke-dasharray="6,4"/>
  <text x="98" y="392" font-size="10.5" font-weight="700" fill="#8A5A08">Custom Attention Backend · Worker Plugin — MCR 주입</text>
  <text x="98" y="408" font-size="9" fill="#8A5A08">변형 A의 cross-tier KV fetch 경로 (변형 B에선 선택적)</text>

  <!-- KV Connector port -->
  <rect x="343" y="427" width="14" height="14" fill="#FFFFFF" stroke="#8A5A08" stroke-width="1.6"/>
  <text x="366" y="439" font-size="10" font-weight="700" fill="#8A5A08">KV Connector API (공식 확장점)</text>
  <line x1="350" y1="441" x2="350" y2="470" stroke="#B45309" stroke-width="1.6" stroke-dasharray="7,5" marker-end="url(#arrAmb)"/>
  <text x="210" y="462" font-size="10" fill="#8A5A08">KV 추출/재주입</text>

  <!-- KV data-movement layer: variant slot -->
  <rect x="60" y="474" width="580" height="216" fill="#FFFFFF" stroke="#44546A" stroke-width="1.4" stroke-dasharray="9,5"/>
  <text x="74" y="496" font-size="12" font-weight="700" fill="#1F2A44">KV 데이터-이동 계층 (골격) — 이 슬롯의 소유자만 변형에 따라 갈림</text>

  <rect x="76" y="510" width="270" height="164" fill="#E9F5EE" stroke="#1B7A4B" stroke-width="1.5"/>
  <text x="90" y="532" font-size="11.5" font-weight="700" fill="#155F3B">변형 A (기준형) — «MCR» Memory Engine</text>
  <text x="90" y="552" font-size="9.5" fill="#155F3B">· KV Index · Cache Manager ·</text>
  <text x="90" y="567" font-size="9.5" fill="#155F3B">  Tier &amp; Lifecycle를 MCR이 직접 소유</text>
  <text x="90" y="586" font-size="9.5" fill="#155F3B">· 배치·압축 정책의 자리 = MCR</text>
  <text x="90" y="601" font-size="9.5" fill="#155F3B">  (DP2 전 후보 열림)</text>
  <text x="90" y="620" font-size="9.5" fill="#155F3B">· 골격 지배력 최대 — 연구 기여</text>
  <text x="90" y="635" font-size="9.5" fill="#155F3B">  (tier-aware·비연속 KV)의 자리 보존</text>

  <rect x="356" y="510" width="270" height="164" fill="#F1EFEA" stroke="#6B7A90" stroke-width="1.4"/>
  <text x="370" y="532" font-size="11.5" font-weight="700" fill="#1F2A44">변형 B — «3rd-party» LMCache</text>
  <text x="370" y="552" font-size="9.5" fill="#6B7A90">· chunking·영속화·CacheGen·CacheBlend</text>
  <text x="370" y="567" font-size="9.5" fill="#1B7A4B">  재구현 없이 상속 (초기 비용 최소)</text>
  <rect x="366" y="578" width="250" height="38" fill="#FDF6E9" stroke="#B45309" stroke-width="1.2" stroke-dasharray="6,4"/>
  <text x="376" y="594" font-size="9.5" font-weight="700" fill="#8A5A08">MCR Policy Hook</text>
  <text x="376" y="608" font-size="9" fill="#8A5A08">배치·압축·재사용 정책 주입 (훅 범위 내)</text>
  <text x="370" y="636" font-size="9.5" fill="#B3402A">· 정책 골격 LMCache 소유 —</text>
  <text x="370" y="651" font-size="9.5" fill="#B3402A">  요청별 SLO 정책 자리 제한</text>

  <!-- backend arrow -->
  <line x1="350" y1="690" x2="350" y2="718" stroke="#B45309" stroke-width="1.6" stroke-dasharray="7,5" marker-end="url(#arrAmb)"/>
  <text x="362" y="710" font-size="10" fill="#8A5A08">변형 B: □ Storage Backend API (put/get/pin) 경유</text>

  <!-- MCR tier assets (common) -->
  <rect x="60" y="722" width="580" height="82" fill="#F4F6FA" stroke="#44546A" stroke-width="1.2"/>
  <text x="74" y="744" font-size="12" font-weight="700" fill="#1F2A44">«MCR» 자사 tier 자산 — CXL · PNM DRAM · HBF (변형 공통)</text>
  <text x="74" y="764" font-size="10" fill="#6B7A90">변형 A: Memory Engine 내 tier 어댑터 모듈 · 변형 B: LMCache storage backend connector 모듈</text>
  <text x="74" y="782" font-size="10" fill="#1B7A4B">tier 추가 = 모듈 1개 (코어 무수정) — 두 변형 동일</text>

  <text x="60" y="836" font-size="10.5" fill="#1B7A4B" font-weight="700">이득(공통): 생태계 무임승차 · 검증된 코어 · 현 자산(P/D proxy·LMCache 연동) 재사용 — 초기 ≤6인월</text>

  <text x="60" y="874" font-size="10.5" fill="#B3402A" font-weight="700">제약(공통): 엔진 scheduler의 tier 비인지 — co-scheduling 이득 미회수, 비연속·압축 KV는 block table 밖</text>
  <text x="60" y="892" font-size="10.5" fill="#B3402A">변형 B 추가 제약: tier-aware decode 경로·근접연산(DP6) 통로 없음 · vLLM+LMCache 이중 upstream 추종</text>

  <!-- ================= RIGHT: 후보2 ================= -->
  <rect x="710" y="76" width="650" height="30" fill="#DCE3EE" stroke="#44546A" stroke-width="1.2"/>
  <text x="722" y="96" font-size="13.5" font-weight="700" fill="#1F2A44">후보구조 2 — 자체 구현형 (독립 framework, 확정안 v2의 무제약 구현)</text>

  <!-- Orchestration -->
  <rect x="730" y="124" width="610" height="100" fill="#F4F6FA" stroke="#44546A" stroke-width="1.2"/>
  <text x="744" y="146" font-size="12" font-weight="700" fill="#1F2A44">«MCR» Inference Orchestration</text>
  <rect x="750" y="158" width="180" height="46" fill="#FFFFFF" stroke="#44546A"/>
  <text x="762" y="178" font-size="11" font-weight="700" fill="#1F2A44">Request Manager</text>
  <text x="762" y="194" font-size="9.5" fill="#6B7A90">admission·RAG·batcher</text>
  <rect x="946" y="158" width="180" height="46" fill="#FFFFFF" stroke="#44546A"/>
  <text x="958" y="178" font-size="11" font-weight="700" fill="#1F2A44">Scheduling</text>
  <text x="958" y="194" font-size="9.5" fill="#6B7A90">KV-aware Router·SLO Mon.</text>
  <rect x="1142" y="158" width="180" height="46" fill="#FFFFFF" stroke="#44546A"/>
  <text x="1154" y="178" font-size="11" font-weight="700" fill="#1F2A44">Resource Manager</text>
  <text x="1154" y="194" font-size="9.5" fill="#6B7A90">HW Mon.·2-loop Autoscaler</text>

  <line x1="880" y1="224" x2="880" y2="258" stroke="#1F2A44" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="890" y="246" font-size="10.5" fill="#1F2A44">«use» dispatch</text>

  <!-- Inference Engine (자체) -->
  <rect x="730" y="262" width="610" height="248" fill="#F4F6FA" stroke="#44546A" stroke-width="1.2"/>
  <text x="744" y="284" font-size="12" font-weight="700" fill="#1F2A44">«MCR» Inference Engine — 자체 구현</text>

  <rect x="754" y="300" width="270" height="70" fill="#E9F5EE" stroke="#1B7A4B" stroke-width="1.5"/>
  <text x="768" y="322" font-size="12" font-weight="700" fill="#155F3B">Tier-aware Scheduler</text>
  <text x="768" y="340" font-size="9.5" fill="#155F3B">tier 잔량·KV 위치·압축 상태가</text>
  <text x="768" y="354" font-size="9.5" fill="#155F3B">admission·배칭 결정에 직접 반영</text>

  <rect x="1050" y="300" width="270" height="70" fill="#FFFFFF" stroke="#44546A" stroke-width="1.2"/>
  <text x="1064" y="322" font-size="12" font-weight="700" fill="#1F2A44">Step Execution Controller</text>
  <text x="1064" y="340" font-size="9.5" fill="#6B7A90">continuous batching·chunked prefill</text>
  <text x="1064" y="354" font-size="9.5" fill="#B3402A">전부 자체 재구현 대상</text>

  <rect x="754" y="386" width="566" height="62" fill="#FFFFFF" stroke="#44546A" stroke-width="1.2"/>
  <text x="768" y="408" font-size="12" font-weight="700" fill="#1F2A44">Kernel &amp; Layer</text>
  <text x="768" y="428" font-size="10" fill="#6B7A90">FlashInfer/자체 Attention · MoE Dispatcher · Custom Kernel · CompressionOp(DI 구현)</text>

  <text x="754" y="480" font-size="10" fill="#6B7A90">모델 zoo·신규 기법 포팅을 자체 유지 (upstream 부재)</text>

  <!-- co-design double arrow -->
  <line x1="870" y1="510" x2="870" y2="560" stroke="#1B7A4B" stroke-width="2.6" marker-end="url(#arrGrn)"/>
  <line x1="890" y1="560" x2="890" y2="510" stroke="#1B7A4B" stroke-width="2.6" marker-end="url(#arrGrn)"/>
  <text x="906" y="530" font-size="11" font-weight="700" fill="#1B7A4B">placement × scheduling co-design</text>
  <text x="906" y="546" font-size="10" fill="#1B7A4B">— 본 후보의 핵심 이득 (QA1·QA2 상한)</text>

  <!-- Memory Engine -->
  <rect x="730" y="564" width="610" height="252" fill="#F4F6FA" stroke="#44546A" stroke-width="1.2"/>
  <text x="744" y="586" font-size="12" font-weight="700" fill="#1F2A44">«MCR» Memory Engine — 설계 중심 (1급 패키지)</text>

  <rect x="754" y="602" width="270" height="80" fill="#E9F5EE" stroke="#1B7A4B" stroke-width="1.5"/>
  <text x="768" y="624" font-size="12" font-weight="700" fill="#155F3B">Tier-agnostic KV/Block Manager</text>
  <text x="768" y="642" font-size="9.5" fill="#155F3B">HBM/PNM/CXL 동일 추상화 —</text>
  <text x="768" y="656" font-size="9.5" fill="#155F3B">압축·비연속 KV를 block table 1급으로</text>

  <rect x="1050" y="602" width="270" height="80" fill="#FFFFFF" stroke="#44546A" stroke-width="1.2"/>
  <text x="1064" y="624" font-size="12" font-weight="700" fill="#1F2A44">Cache Manager</text>
  <text x="1064" y="642" font-size="9.5" fill="#6B7A90">KV Index (prefix/infix) ·</text>
  <text x="1064" y="656" font-size="9.5" fill="#6B7A90">Memory Compressor</text>

  <rect x="754" y="698" width="566" height="58" fill="#FFFFFF" stroke="#44546A" stroke-width="1.2"/>
  <text x="768" y="720" font-size="12" font-weight="700" fill="#1F2A44">Tier &amp; Lifecycle</text>
  <text x="768" y="738" font-size="10" fill="#6B7A90">Tier Topology Model (자사 HW 로드맵 직접 수용) · Migration · KV Transport</text>

  <text x="754" y="788" font-size="10" fill="#1B7A4B">자사 디바이스(HBM4·CMM-DC·HBF) 확장점 제약 없음 — QA4(자사 HW) 최고</text>

  <text x="730" y="852" font-size="10.5" fill="#B3402A" font-weight="700">리스크: 배칭·모델 지원·수치 검증을 전부 자체 구축 + 영구 추종 (수십 인월+,</text>
  <text x="730" y="870" font-size="10.5" fill="#B3402A" font-weight="700">vLLM 동등 baseline 도달 자체가 선행 과제 — QA1 상한과 도달 확률의 분리)</text>

  <!-- Legend -->
  <rect x="44" y="956" width="22" height="14" fill="#E9F5EE" stroke="#1B7A4B" stroke-width="1.3"/>
  <text x="74" y="967" font-size="10.5" fill="#1F2A44">구조적 이득 지점</text>
  <rect x="196" y="956" width="22" height="14" fill="#FDF6E9" stroke="#B45309" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="226" y="967" font-size="10.5" fill="#1F2A44">MCR 신설/주입</text>
  <rect x="336" y="956" width="22" height="14" fill="#F1EFEA" stroke="#6B7A90" stroke-width="1.2"/>
  <text x="366" y="967" font-size="10.5" fill="#1F2A44">3rd-party (vLLM·LMCache)</text>
  <rect x="516" y="956" width="14" height="14" fill="#FFFFFF" stroke="#8A5A08" stroke-width="1.6"/>
  <text x="538" y="967" font-size="10.5" fill="#1F2A44">공식 확장점 포트</text>
  <rect x="676" y="956" width="22" height="14" fill="#FFFFFF" stroke="#44546A" stroke-width="1.2" stroke-dasharray="7,4"/>
  <text x="706" y="967" font-size="10.5" fill="#1F2A44">변형 선택 슬롯</text>
  <text x="830" y="967" font-size="10.5" fill="#B3402A">적색 텍스트 = 구조적 제약/리스크</text>
