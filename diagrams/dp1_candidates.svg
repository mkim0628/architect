  <text x="98" y="346" font-size="9.5" fill="#B3402A">tier 비인지 — GPU block 잔량만으로 admission</text>

  <rect x="365" y="306" width="255" height="66" fill="#FFFFFF" stroke="#44546A" stroke-width="1.2"/>
  <text x="379" y="328" font-size="12" font-weight="700" fill="#1F2A44">Block Manager</text>
  <text x="379" y="346" font-size="9.5" fill="#B3402A">GPU/CPU 이분법 — PNM·CXL tier 자리 없음</text>

  <rect x="84" y="392" width="255" height="66" fill="#FFFFFF" stroke="#44546A" stroke-width="1.2"/>
  <text x="98" y="414" font-size="12" font-weight="700" fill="#1F2A44">Model Executor / Worker</text>
  <text x="98" y="432" font-size="9.5" fill="#6B7A90">배칭·spec decoding 등 upstream 무임승차</text>

  <rect x="365" y="392" width="255" height="66" fill="#FDF6E9" stroke="#B45309" stroke-width="1.3" stroke-dasharray="6,4"/>
  <text x="379" y="414" font-size="12" font-weight="700" fill="#8A5A08">Custom Attention Backend</text>
  <text x="379" y="432" font-size="9.5" fill="#8A5A08">MCR 주입 — cross-tier KV fetch 경로</text>

  <text x="84" y="492" font-size="10.5" fill="#B3402A" font-weight="700">구조적 제약: placement 결정이 iteration 스케줄과 미통합 (사후적·reactive)</text>
  <text x="84" y="510" font-size="10.5" fill="#B3402A">→ 비연속·압축 KV는 block table 밖 2급 관리 (copy/변환 오버헤드)</text>

  <text x="84" y="560" font-size="10.5" fill="#6B7A90">vLLM 코어는 무수정 원칙 — 막히는 지점은 upstream RFC 기여로 해소 (fork 금지)</text>

