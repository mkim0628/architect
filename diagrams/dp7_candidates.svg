<svg viewBox="0 0 1400 820" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#1F2A44"/>
    </marker>
    <marker id="arrAmb" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#B45309"/>
    </marker>
    <marker id="arrGrn" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#1B7A4B"/>
    </marker>
  </defs>

  <text x="44" y="36" font-size="20" font-weight="700" fill="#1F2A44">DP7. SSD-PIM 검색의 실행 구조 — 전수 스캔 vs 인덱스 유도 스캔 (전제: ADR-001)</text>
  <text x="44" y="57" font-size="11.5" fill="#6B7A90">녹색: 구조적 이득 지점 · 적색: 구조적 제약 · 주황: 신설 요소 · 회색 채움: 스캔되는 범위</text>

  <line x1="700" y1="72" x2="700" y2="770" stroke="#C9D2DE" stroke-width="1"/>

  <!-- ================= LEFT: 후보1 ================= -->
  <rect x="40" y="76" width="620" height="30" fill="#DCE3EE" stroke="#44546A" stroke-width="1.2"/>
  <text x="52" y="96" font-size="13.5" font-weight="700" fill="#1F2A44">후보구조 1 — 전수 스캔형 (exact, scan-native)</text>

  <!-- Host -->
  <rect x="60" y="124" width="580" height="96" fill="#F4F6FA" stroke="#44546A" stroke-width="1.2"/>
  <text x="74" y="146" font-size="12" font-weight="700" fill="#1F2A44">Host — Retrieval Engine</text>
  <rect x="80" y="160" width="255" height="46" fill="#FFFFFF" stroke="#44546A"/>
  <text x="92" y="180" font-size="10.5" font-weight="700" fill="#1F2A44">질의 임베딩 브로드캐스트</text>
  <text x="92" y="196" font-size="9.5" fill="#6B7A90">전 파티션 동시 발행</text>
  <rect x="365" y="160" width="255" height="46" fill="#FFFFFF" stroke="#44546A"/>
  <text x="377" y="180" font-size="10.5" font-weight="700" fill="#1F2A44">전역 top-k 병합</text>
  <text x="377" y="196" font-size="9.5" fill="#6B7A90">파티션별 로컬 top-k 수집</text>

  <!-- broadcast arrows -->
  <line x1="150" y1="220" x2="150" y2="268" stroke="#1F2A44" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="345" y1="220" x2="345" y2="268" stroke="#1F2A44" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="540" y1="220" x2="540" y2="268" stroke="#1F2A44" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="164" y="250" font-size="9.5" fill="#1F2A44">query 브로드캐스트</text>
  <line x1="490" y1="268" x2="490" y2="220" stroke="#1B7A4B" stroke-width="1.6" marker-end="url(#arrGrn)"/>
  <text x="404" y="250" font-size="9.5" fill="#1B7A4B">로컬 top-k ↑</text>

  <!-- SSD-PIM partitions -->
  <rect x="60" y="272" width="580" height="180" fill="#F4F6FA" stroke="#44546A" stroke-width="1.2"/>
  <text x="74" y="294" font-size="12" font-weight="700" fill="#1F2A44">SSD-PIM 파티션들 — 코퍼스 샤딩 (인덱스 없음)</text>

  <rect x="84" y="310" width="170" height="106" fill="#E8EBF0" stroke="#44546A"/>
  <text x="96" y="332" font-size="10.5" font-weight="700" fill="#1F2A44">파티션 1</text>
  <text x="96" y="350" font-size="9.5" fill="#1F2A44">GEMV 스트리밍 스캔</text>
  <text x="96" y="366" font-size="9.5" fill="#6B7A90">벡터 전량 (NAND→DRAM)</text>
  <text x="96" y="382" font-size="9.5" fill="#6B7A90">→ 로컬 top-k</text>
  <text x="96" y="404" font-size="9" fill="#6B7A90">내부 BW &gt; 외부 PCIe</text>

  <rect x="270" y="310" width="170" height="106" fill="#E8EBF0" stroke="#44546A"/>
  <text x="282" y="332" font-size="10.5" font-weight="700" fill="#1F2A44">파티션 2</text>
  <text x="282" y="350" font-size="9.5" fill="#1F2A44">GEMV 스트리밍 스캔</text>
  <text x="282" y="366" font-size="9.5" fill="#6B7A90">벡터 전량</text>
  <text x="282" y="382" font-size="9.5" fill="#6B7A90">→ 로컬 top-k</text>

  <rect x="456" y="310" width="170" height="106" fill="#E8EBF0" stroke="#44546A"/>
  <text x="468" y="332" font-size="10.5" font-weight="700" fill="#1F2A44">파티션 N</text>
  <text x="468" y="350" font-size="9.5" fill="#1F2A44">GEMV 스트리밍 스캔</text>
  <text x="468" y="366" font-size="9.5" fill="#6B7A90">벡터 전량</text>
  <text x="468" y="382" font-size="9.5" fill="#6B7A90">→ 로컬 top-k</text>

  <text x="84" y="440" font-size="9.5" fill="#6B7A90">회색 채움 = 매 질의마다 전량 스캔 (모든 파티션의 모든 벡터)</text>

  <!-- append path -->
  <line x1="646" y1="490" x2="560" y2="456" stroke="#1B7A4B" stroke-width="1.6" stroke-dasharray="6,4" marker-end="url(#arrGrn)"/>
  <text x="420" y="494" font-size="10" fill="#1B7A4B">신규 문서 → 파티션 append-only (인덱싱 파이프라인 불필요)</text>

  <text x="60" y="546" font-size="10.5" fill="#1B7A4B" font-weight="700">이득: recall 100% (exact) — 검색발 품질 저하 구조적 0 · 인덱스 유지비 0 (agent memory 상시 추가에 최강)</text>
  <text x="60" y="564" font-size="10.5" fill="#1B7A4B">지연 결정론적 (코퍼스/대역폭) — SLO 예측 가능 · 초기 ≤6인월</text>

  <text x="60" y="608" font-size="10.5" fill="#B3402A" font-weight="700">제약: 지연 ≈ 코퍼스 바이트 / 내부 유효 BW — 코퍼스에 선형, TTFT 예산(450ms) 내 코퍼스 상한이 구조에 박힘</text>
  <text x="60" y="626" font-size="10.5" fill="#B3402A">매 질의 전량 접근 (에너지·대역폭) · 상한 도달 시 대응 = 파티션 증설뿐 (비용 선형)</text>

  <!-- ================= RIGHT: 후보2 ================= -->
  <rect x="710" y="76" width="650" height="30" fill="#DCE3EE" stroke="#44546A" stroke-width="1.2"/>
  <text x="722" y="96" font-size="13.5" font-weight="700" fill="#1F2A44">후보구조 2 — 인덱스 유도형 (IVF/graph-guided partial scan, SmartANNS형)</text>

  <!-- Host -->
  <rect x="730" y="124" width="610" height="120" fill="#F4F6FA" stroke="#44546A" stroke-width="1.2"/>
  <text x="744" y="146" font-size="12" font-weight="700" fill="#1F2A44">Host — Retrieval Engine + 상위 인덱스</text>
  <rect x="750" y="160" width="280" height="70" fill="#FDF6E9" stroke="#B45309" stroke-width="1.3" stroke-dasharray="6,4"/>
  <text x="762" y="182" font-size="10.5" font-weight="700" fill="#8A5A08">상위 인덱스 (host DRAM 상주)</text>
  <text x="762" y="200" font-size="9.5" fill="#8A5A08">IVF centroid / 그래프 상위층</text>
  <text x="762" y="216" font-size="9.5" fill="#8A5A08">→ 후보 클러스터 선별 (sublinear)</text>
  <rect x="1060" y="160" width="260" height="70" fill="#FFFFFF" stroke="#44546A"/>
  <text x="1072" y="182" font-size="10.5" font-weight="700" fill="#1F2A44">top-k 병합·반환</text>
  <text x="1072" y="200" font-size="9.5" fill="#B3402A">host↔SSD 조정 왕복 오버헤드</text>

  <line x1="890" y1="244" x2="890" y2="288" stroke="#1F2A44" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="902" y="272" font-size="10" fill="#1F2A44">선택된 클러스터 id만 전달</text>

  <!-- SSD-PIM -->
  <rect x="730" y="292" width="610" height="170" fill="#F4F6FA" stroke="#44546A" stroke-width="1.2"/>
  <text x="744" y="314" font-size="12" font-weight="700" fill="#1F2A44">SSD-PIM — 선택된 클러스터 내부만 GEMV 스캔</text>

  <rect x="754" y="330" width="130" height="96" fill="#E8EBF0" stroke="#44546A"/>
  <text x="766" y="352" font-size="10" font-weight="700" fill="#1F2A44">클러스터 3</text>
  <text x="766" y="370" font-size="9" fill="#1F2A44">부분 스캔 ✓</text>
  <rect x="900" y="330" width="130" height="96" fill="#FFFFFF" stroke="#C9D2DE"/>
  <text x="912" y="352" font-size="10" fill="#9AA6B5">클러스터 7</text>
  <text x="912" y="370" font-size="9" fill="#9AA6B5">스킵</text>
  <rect x="1046" y="330" width="130" height="96" fill="#E8EBF0" stroke="#44546A"/>
  <text x="1058" y="352" font-size="10" font-weight="700" fill="#1F2A44">클러스터 12</text>
  <text x="1058" y="370" font-size="9" fill="#1F2A44">부분 스캔 ✓</text>
  <rect x="1192" y="330" width="130" height="96" fill="#FFFFFF" stroke="#C9D2DE"/>
  <text x="1204" y="352" font-size="10" fill="#9AA6B5">클러스터 …</text>
  <text x="1204" y="370" font-size="9" fill="#9AA6B5">스킵</text>

  <text x="754" y="450" font-size="9.5" fill="#B3402A">불규칙(클러스터 점프) NAND 접근 — PIM 스트리밍 모델과 상성 저하</text>

  <!-- incremental indexing -->
  <rect x="730" y="486" width="610" height="60" fill="#FDF6E9" stroke="#B45309" stroke-width="1.3" stroke-dasharray="6,4"/>
  <text x="744" y="508" font-size="11" font-weight="700" fill="#8A5A08">증분 인덱싱 파이프라인 (신설) — 문서 추가 시 인덱스 빌드·갱신 경유</text>
  <text x="744" y="528" font-size="9.5" fill="#8A5A08">증분 갱신이 독립 연구 주제일 만큼 비용 실재 (SPFresh 계열, B)</text>

  <text x="730" y="586" font-size="10.5" fill="#1B7A4B" font-weight="700">이득: sublinear 지연 — billion-scale에서도 TTFT 예산 내 (SmartANNS QPS 최대 10.7×, B),</text>
  <text x="730" y="604" font-size="10.5" fill="#1B7A4B">질의당 스캔 바이트·에너지 절감 · 코퍼스 상한이 인덱스 품질의 함수 (증설 없이 확장)</text>

  <text x="730" y="646" font-size="10.5" fill="#B3402A" font-weight="700">리스크: recall &lt; 100% — ANN 근사 손실이 응답 품질로 전이 (nprobe/ef 튜닝 상시 부담),</text>
  <text x="730" y="664" font-size="10.5" fill="#B3402A">인덱스 빌드·증분 갱신 파이프라인 비용 (초기 6–24인월·유지 ≤2 FTE)</text>

  <!-- evolution note -->
  <rect x="60" y="692" width="1280" height="56" fill="#F4F6FA" stroke="#6B7A90" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="76" y="714" font-size="10.5" font-weight="700" fill="#1F2A44">진화 경로 (검토 노트): 후보1로 시작(exact 품질 베이스라인 + 갱신 파이프라인 없이 E2E 완주) → 코퍼스가 임계(≈내부 유효 BW × TTFT 예산) 초과 시</text>
  <text x="76" y="732" font-size="10.5" fill="#6B7A90">상위 IVF 층만 추가해 계층형(상위 인덱스 + 클러스터 내 전수 스캔 = 두 후보의 수렴점)으로 전환 — 트리거를 ADR에 명시</text>

  <!-- Legend -->
  <rect x="44" y="776" width="22" height="14" fill="#E8EBF0" stroke="#44546A" stroke-width="1.2"/>
  <text x="74" y="787" font-size="10.5" fill="#1F2A44">스캔되는 범위</text>
  <rect x="186" y="776" width="22" height="14" fill="#FDF6E9" stroke="#B45309" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="216" y="787" font-size="10.5" fill="#1F2A44">신설 요소</text>
  <text x="330" y="787" font-size="10.5" fill="#B3402A">적색 텍스트 = 구조적 제약/리스크</text>
</svg>
