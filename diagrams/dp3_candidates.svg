<svg viewBox="0 0 1400 880" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#1F2A44"/>
    </marker>
    <marker id="arrAmb" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#B45309"/>
    </marker>
    <marker id="arrGrn" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#1B7A4B"/>
    </marker>
  </defs>

  <text x="44" y="36" font-size="20" font-weight="700" fill="#1F2A44">DP3. KV 재사용 범위·복원 전략 — 후보구조 설계도</text>
  <text x="44" y="57" font-size="11.5" fill="#6B7A90">녹색: 구조적 이득 지점 · 적색: 구조적 제약 · 주황: 신설/확장 요소</text>

  <line x1="700" y1="72" x2="700" y2="830" stroke="#C9D2DE" stroke-width="1"/>

  <!-- ================= LEFT: 후보1 ================= -->
  <rect x="40" y="76" width="620" height="30" fill="#DCE3EE" stroke="#44546A" stroke-width="1.2"/>
  <text x="52" y="96" font-size="13.5" font-weight="700" fill="#1F2A44">후보구조 1 — Exact-prefix 재사용 (block-aligned)</text>

  <!-- Orchestration -->
  <rect x="60" y="124" width="580" height="102" fill="#F4F6FA" stroke="#44546A" stroke-width="1.2"/>
  <text x="74" y="146" font-size="12" font-weight="700" fill="#1F2A44">«MCR» Inference Orchestration</text>
  <rect x="80" y="160" width="255" height="50" fill="#FFFFFF" stroke="#44546A"/>
  <text x="92" y="180" font-size="11" font-weight="700" fill="#1F2A44">Retrieval Engine (RAG)</text>
  <text x="92" y="198" font-size="9.5" fill="#B3402A">chunk 목록 → 재사용 판정에 미사용</text>
  <rect x="365" y="160" width="255" height="50" fill="#FFFFFF" stroke="#44546A"/>
  <text x="377" y="180" font-size="11" font-weight="700" fill="#1F2A44">KV-aware Router</text>
  <text x="377" y="198" font-size="9.5" fill="#6B7A90">prefix 일치 길이만 조회</text>

  <line x1="492" y1="226" x2="492" y2="266" stroke="#1F2A44" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="502" y="250" font-size="10.5" fill="#1F2A44">«use» KV Locator — prefix 일치 길이 조회</text>

  <!-- Memory Engine -->
  <rect x="60" y="270" width="580" height="230" fill="#F4F6FA" stroke="#44546A" stroke-width="1.2"/>
  <text x="74" y="292" font-size="12" font-weight="700" fill="#1F2A44">«MCR» Memory Engine</text>

  <rect x="84" y="308" width="255" height="108" fill="#FFFFFF" stroke="#44546A" stroke-width="1.2"/>
  <text x="98" y="330" font-size="12" font-weight="700" fill="#1F2A44">KV Index</text>
  <text x="98" y="350" font-size="10" fill="#6B7A90">· 블록 단위 prefix 해시 체인</text>
  <text x="98" y="367" font-size="10" fill="#6B7A90">· prefix 일치 검색만 (infix 불가)</text>
  <text x="98" y="384" font-size="10" fill="#1B7A4B">· 구조 단순 — eviction 일관성 용이</text>

  <rect x="365" y="308" width="255" height="108" fill="#FFFFFF" stroke="#44546A" stroke-width="1.2"/>
  <text x="379" y="330" font-size="12" font-weight="700" fill="#1F2A44">Cache Manager</text>
  <text x="379" y="350" font-size="10" fill="#6B7A90">· KV Cache Manager</text>
  <text x="379" y="367" font-size="10" fill="#6B7A90">· Memory Compressor</text>
  <text x="379" y="384" font-size="10" fill="#6B7A90">· 복원 파이프라인 없음</text>

  <text x="84" y="446" font-size="10.5" font-weight="700" fill="#1F2A44">재사용 경로: 일치 prefix 구간 = 그대로 사용 (위치 보존 KV만)</text>
  <text x="84" y="466" font-size="10.5" fill="#B3402A" font-weight="700">불일치 지점부터 전량 재계산 — 복원 경로 자체가 없음</text>

  <text x="60" y="536" font-size="10.5" fill="#B3402A" font-weight="700">구조적 제약: RAG의 비연속 공유 chunk 히트 불가 (동일 chunk가 요청마다 다른 위치)</text>
  <text x="60" y="554" font-size="10.5" fill="#B3402A">→ 재사용률 상한이 워크로드 prefix 구조에 갇힘 — agent 장기기억(중간 삽입) 미회수</text>

  <text x="60" y="600" font-size="10.5" fill="#1B7A4B" font-weight="700">이득: 재사용발 품질 저하 구조적 0 · vLLM prefix caching으로 대규모 검증된 경로</text>
  <text x="60" y="618" font-size="10.5" fill="#1B7A4B">DP1 확장형과 완전 호환 · 초기 ≤6인월</text>

  <!-- ================= RIGHT: 후보2 ================= -->
  <rect x="710" y="76" width="650" height="30" fill="#DCE3EE" stroke="#44546A" stroke-width="1.2"/>
  <text x="722" y="96" font-size="13.5" font-weight="700" fill="#1F2A44">후보구조 2 — 비연속 chunk 재사용 + selective recompute (CacheBlend형)</text>

  <!-- Orchestration -->
  <rect x="730" y="124" width="610" height="102" fill="#F4F6FA" stroke="#44546A" stroke-width="1.2"/>
  <text x="744" y="146" font-size="12" font-weight="700" fill="#1F2A44">«MCR» Inference Orchestration</text>
  <rect x="750" y="160" width="260" height="50" fill="#FFFFFF" stroke="#44546A"/>
  <text x="762" y="180" font-size="11" font-weight="700" fill="#1F2A44">Retrieval Engine (RAG)</text>
  <text x="762" y="198" font-size="9.5" fill="#6B7A90">retrieval chunk 목록 생성</text>
  <rect x="1070" y="160" width="260" height="50" fill="#FFFFFF" stroke="#44546A"/>
  <text x="1082" y="180" font-size="11" font-weight="700" fill="#1F2A44">KV-aware Router</text>
  <text x="1082" y="198" font-size="9.5" fill="#155F3B">재사용 후보 명단 생성</text>

  <line x1="1010" y1="185" x2="1066" y2="185" stroke="#1B7A4B" stroke-width="2" marker-end="url(#arrGrn)"/>
  <text x="1013" y="176" font-size="9" fill="#1B7A4B">chunk 목록</text>

  <line x1="1200" y1="226" x2="1200" y2="266" stroke="#1F2A44" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="905" y="250" font-size="10.5" fill="#1F2A44">«use» KV Locator — 재사용 후보 명단 조회 (prefix/infix)</text>

  <!-- Memory Engine -->
  <rect x="730" y="270" width="610" height="330" fill="#F4F6FA" stroke="#44546A" stroke-width="1.2"/>
  <text x="744" y="292" font-size="12" font-weight="700" fill="#1F2A44">«MCR» Memory Engine</text>

  <rect x="754" y="308" width="275" height="112" fill="#FDF6E9" stroke="#B45309" stroke-width="1.3" stroke-dasharray="6,4"/>
  <text x="768" y="330" font-size="12" font-weight="700" fill="#8A5A08">KV Index (확장)</text>
  <text x="768" y="350" font-size="10" fill="#8A5A08">· content-hash 기반 chunk 단위 키</text>
  <text x="768" y="367" font-size="10" fill="#8A5A08">· prefix/infix lookup (01 신설 목적 그대로)</text>
  <text x="768" y="384" font-size="10" fill="#8A5A08">· prefix는 content-hash의 특수형</text>

  <rect x="1055" y="308" width="275" height="112" fill="#FDF6E9" stroke="#B45309" stroke-width="1.3" stroke-dasharray="6,4"/>
  <text x="1069" y="330" font-size="12" font-weight="700" fill="#8A5A08">복원 파이프라인 (신설)</text>
  <text x="1069" y="350" font-size="10" fill="#8A5A08">· 위치 불일치 chunk 재배치</text>
  <text x="1069" y="367" font-size="10" fill="#8A5A08">· 경계 토큰 selective recompute</text>
  <text x="1069" y="384" font-size="10" fill="#8A5A08">  (토큰의 10–15%만 재계산)</text>

  <line x1="1029" y1="364" x2="1051" y2="364" stroke="#B45309" stroke-width="1.6" stroke-dasharray="7,5" marker-end="url(#arrAmb)"/>

  <rect x="754" y="440" width="275" height="80" fill="#FFFFFF" stroke="#44546A" stroke-width="1.2"/>
  <text x="768" y="462" font-size="12" font-weight="700" fill="#1F2A44">Cache Manager</text>
  <text x="768" y="482" font-size="10" fill="#6B7A90">· KV Cache Manager · Compressor</text>
  <text x="768" y="499" font-size="10" fill="#B3402A">· eviction ↔ Index 일관성 부담</text>

  <rect x="1055" y="440" width="275" height="80" fill="#FFFFFF" stroke="#44546A" stroke-width="1.2"/>
  <text x="1069" y="462" font-size="12" font-weight="700" fill="#1F2A44">block table 밖 1급 KV</text>
  <text x="1069" y="482" font-size="10" fill="#B3402A">· DP1 확장형과 구조적 긴장</text>
  <text x="1069" y="499" font-size="10" fill="#B3402A">· (2급 시민 시 copy/변환 오버헤드)</text>

  <text x="754" y="552" font-size="10.5" fill="#1F2A44" font-weight="700">재사용 경로: 일치 chunk = 재배치 후 사용 · 경계만 부분 재계산 · 잔여만 전량 재계산</text>
  <text x="754" y="572" font-size="10.5" fill="#6B7A90">재사용/재계산 판단 = 품질 예산 집행의 일부 (DP2 채택안에 종속)</text>

  <text x="730" y="628" font-size="10.5" fill="#1B7A4B" font-weight="700">이득: TTFT 2.2–3.3× · 처리율 2.8–5× (CacheBlend, B) — RAG·agent 재사용률 상한 최대,</text>
  <text x="730" y="646" font-size="10.5" fill="#1B7A4B">chunk 전역 dedup으로 유효 KV 용량 동반 상승 · "재사용 축 joint orchestration" 기여 성립</text>

  <text x="730" y="688" font-size="10.5" fill="#B3402A" font-weight="700">리스크: 위치 근사·부분 재계산의 품질 비용 (K&gt;V sensitivity와 결합 — bound 관리 필요),</text>
  <text x="730" y="706" font-size="10.5" fill="#B3402A">content-hash Index·복원 파이프라인·판정 로직 신규 복잡도 (초기 6–24인월)</text>

  <!-- 진화 경로 note -->
  <rect x="60" y="740" width="1280" height="54" fill="#F4F6FA" stroke="#6B7A90" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="76" y="762" font-size="10.5" font-weight="700" fill="#1F2A44">진화 경로 (검토 노트): 후보1로 시작하되 KV Index 키 스키마를 처음부터 content-hash로 설계 (prefix = content-hash의 특수형)</text>
  <text x="76" y="780" font-size="10.5" fill="#6B7A90">→ 실측 히트율 격차가 임계(chunk 히트 기회 ≥ prefix 히트의 2×)를 넘으면 복원 파이프라인만 증설하여 후보2로 전환 (트리거를 ADR에 명시)</text>

  <!-- Legend -->
  <rect x="44" y="836" width="22" height="14" fill="#E9F5EE" stroke="#1B7A4B" stroke-width="1.3"/>
  <text x="74" y="847" font-size="10.5" fill="#1F2A44">구조적 이득 지점</text>
  <rect x="196" y="836" width="22" height="14" fill="#FDF6E9" stroke="#B45309" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="226" y="847" font-size="10.5" fill="#1F2A44">신설/확장 요소</text>
  <text x="360" y="847" font-size="10.5" fill="#B3402A">적색 텍스트 = 구조적 제약/리스크</text>
</svg>
